<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Run Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #gameContainer {
            position: relative;
            width: 1000px;
            height: 500px;
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 50%, #90ee90 50%, #228b22 100%);
            border: 4px solid #fff;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui {
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: white;
            font-size: 1.3em;
            margin-bottom: 15px;
            gap: 30px;
        }

        .score-display, .high-score-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }

        .score-label {
            font-size: 0.85em;
            color: #ddd;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffeb3b;
        }

        .instructions {
            color: #fff;
            font-size: 1em;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            border-radius: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        .instructions strong {
            color: #ffeb3b;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9em;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏃 PEOPLE RUN GAME 🏃</h1>
        
        <div class="ui">
            <div class="score-display">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="high-score-display">
                <div class="score-label">HIGH SCORE</div>
                <div class="score-value" id="highScore">0</div>
            </div>
        </div>

        <div id="gameContainer">
            <canvas id="gameCanvas" width="1000" height="500"></canvas>
        </div>

        <div class="instructions">
            <strong>How to Play:</strong><br>
            🖱️ <strong>CLICK</strong> or <strong>SPACEBAR</strong> to JUMP<br>
            Avoid the obstacles and collect coins to score points!<br>
            <strong>Jump Timing is Key!</strong> Dodge the obstacles coming your way.
        </div>
        <div class="status" id="gameStatus"></div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let score = 0;
        let highScore = localStorage.getItem('peopleRunHighScore') || 0;
        let gameRunning = false;
        let gameOver = false;

        // Ground level
        const groundLevel = canvas.height - 150;

        // Player object
        const player = {
            x: 50,
            y: groundLevel,
            width: 30,
            height: 50,
            velocityY: 0,
            isJumping: false,
            jumpPower: 18,
            gravity: 0.7,
            color: '#ff6b6b',
            
            jump: function() {
                if (!this.isJumping) {
                    this.velocityY = -this.jumpPower;
                    this.isJumping = true;
                }
            },
            
            update: function() {
                // Apply gravity
                this.velocityY += this.gravity;
                this.y += this.velocityY;

                // Ground collision
                if (this.y >= groundLevel) {
                    this.y = groundLevel;
                    this.velocityY = 0;
                    this.isJumping = false;
                }

                // Ceiling collision
                if (this.y <= 0) {
                    this.y = 0;
                    this.velocityY = 0;
                }
            },
            
            draw: function() {
                // Body
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // Head
                ctx.fillStyle = '#ffb3ba';
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y - 10, 12, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 5, this.y - 15, 5, 5);
                ctx.fillRect(this.x + 18, this.y - 15, 5, 5);

                // Smile
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x + this.width / 2, this.y - 8, 5, 0, Math.PI);
                ctx.stroke();
            }
        };

        // Obstacles array
        let obstacles = [];
        let coins = [];

        // Game parameters
        let gameSpeed = 7;
        let spawnRate = 0.015;
        let difficulty = 0;

        // Input handling
        let spacePressed = false;
        let clickPressed = false;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!spacePressed) {
                    spacePressed = true;
                    handleInput();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                spacePressed = false;
            }
        });

        canvas.addEventListener('click', () => {
            handleInput();
        });

        function handleInput() {
            if (!gameRunning && !gameOver) {
                startGame();
            } else if (gameRunning) {
                player.jump();
            } else if (gameOver) {
                resetGame();
            }
        }

        // Start game
        function startGame() {
            gameRunning = true;
            document.getElementById('gameStatus').textContent = '🎮 Game Running... Jump!';
        }

        // Reset game
        function resetGame() {
            score = 0;
            gameRunning = true;
            gameOver = false;
            obstacles = [];
            coins = [];
            gameSpeed = 7;
            difficulty = 0;
            player.y = groundLevel;
            player.velocityY = 0;
            player.isJumping = false;
            document.getElementById('gameStatus').textContent = '🎮 Game Running... Jump!';
            updateScore();
        }

        // Spawn obstacles
        function spawnObstacles() {
            if (Math.random() < spawnRate) {
                const obstacleTypes = ['cactus', 'rock', 'bird'];
                const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                
                let obstacle = {
                    x: canvas.width,
                    y: 0,
                    width: 30,
                    height: 50,
                    type: type,
                    color: '#333'
                };

                if (type === 'cactus') {
                    obstacle.y = groundLevel;
                    obstacle.color = '#228b22';
                } else if (type === 'rock') {
                    obstacle.y = groundLevel;
                    obstacle.color = '#666';
                } else if (type === 'bird') {
                    obstacle.y = groundLevel - 80;
                    obstacle.height = 25;
                    obstacle.color = '#8b4513';
                }

                obstacles.push(obstacle);
            }

            // Spawn coins
            if (Math.random() < spawnRate * 0.5) {
                coins.push({
                    x: canvas.width,
                    y: groundLevel - 60,
                    width: 20,
                    height: 20,
                    collected: false,
                    color: '#ffeb3b'
                });
            }
        }

        // Update obstacles
        function updateObstacles() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;

                // Collision detection
                if (checkCollision(player, obstacles[i])) {
                    endGame();
                }

                // Remove off-screen obstacles
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score += 5;
                }
            }
        }

        // Update coins
        function updateCoins() {
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].x -= gameSpeed;

                // Collision detection
                if (!coins[i].collected && checkCollision(player, coins[i])) {
                    coins[i].collected = true;
                    score += 10;
                }

                // Remove off-screen coins
                if (coins[i].x + coins[i].width < 0) {
                    coins.splice(i, 1);
                }
            }
        }

        // Collision detection (AABB)
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // End game
        function endGame() {
            gameRunning = false;
            gameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('peopleRunHighScore', highScore);
            }
            document.getElementById('gameStatus').textContent = '💥 GAME OVER! Click or Press SPACE to restart...';
        }

        // Update score display
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('highScore').textContent = highScore;
        }

        // Increase difficulty
        function increaseDifficulty() {
            difficulty = Math.floor(score / 50);
            gameSpeed = 7 + difficulty * 0.5;
            spawnRate = 0.015 + difficulty * 0.002;
        }

        // Draw functions
        function drawObstacles() {
            for (let obstacle of obstacles) {
                ctx.fillStyle = obstacle.color;

                if (obstacle.type === 'cactus') {
                    // Draw cactus
                    ctx.fillRect(obstacle.x + 10, obstacle.y - obstacle.height, 10, obstacle.height);
                    ctx.fillRect(obstacle.x, obstacle.y - obstacle.height + 10, 10, 10);
                    ctx.fillRect(obstacle.x + 20, obstacle.y - obstacle.height + 15, 10, 10);
                } else if (obstacle.type === 'rock') {
                    // Draw rock
                    ctx.beginPath();
                    ctx.moveTo(obstacle.x, obstacle.y - obstacle.height);
                    ctx.lineTo(obstacle.x + obstacle.width, obstacle.y - obstacle.height + 10);
                    ctx.lineTo(obstacle.x + obstacle.width, obstacle.y);
                    ctx.lineTo(obstacle.x, obstacle.y);
                    ctx.fill();
                } else if (obstacle.type === 'bird') {
                    // Draw bird
                    ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                    ctx.fillRect(obstacle.x - 10, obstacle.y + 5, 10, 5);
                    ctx.fillRect(obstacle.x + obstacle.width, obstacle.y + 5, 10, 5);
                }
            }
        }

        function drawCoins() {
            for (let coin of coins) {
                if (!coin.collected) {
                    ctx.fillStyle = coin.color;
                    ctx.beginPath();
                    ctx.arc(coin.x + coin.width / 2, coin.y + coin.height / 2, coin.width / 2, 0, Math.PI * 2);
                    ctx.fill();

                    // Coin shine
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(coin.x + coin.width / 2 - 5, coin.y + coin.height / 2 - 5, 3, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }

        function drawGround() {
            // Grass
            ctx.fillStyle = '#90ee90';
            ctx.fillRect(0, groundLevel + player.height, canvas.width, canvas.height - groundLevel - player.height);

            // Ground line
            ctx.strokeStyle = '#228b22';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, groundLevel + player.height);
            ctx.lineTo(canvas.width, groundLevel + player.height);
            ctx.stroke();
        }

        function drawGameOver() {
            // Semi-transparent overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Game over text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER!', canvas.width / 2, canvas.height / 2 - 60);

            ctx.font = 'bold 30px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

            if (score > 0) {
                ctx.font = '20px Arial';
                ctx.fillText('High Score: ' + highScore, canvas.width / 2, canvas.height / 2 + 70);
            }
        }

        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            // Cloud 1
            ctx.beginPath();
            ctx.arc(150, 80, 25, 0, Math.PI * 2);
            ctx.arc(180, 70, 30, 0, Math.PI * 2);
            ctx.arc(210, 80, 25, 0, Math.PI * 2);
            ctx.fill();

            // Cloud 2
            ctx.beginPath();
            ctx.arc(750, 100, 20, 0, Math.PI * 2);
            ctx.arc(780, 90, 25, 0, Math.PI * 2);
            ctx.arc(810, 100, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        function draw() {
            // Clear canvas with sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, groundLevel + player.height);
            gradient.addColorStop(0, '#87ceeb');
            gradient.addColorStop(1, '#e0f6ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw clouds
            drawClouds();

            // Draw game elements
            drawGround();
            drawCoins();
            drawObstacles();
            player.draw();

            // Draw game over screen
            if (gameOver) {
                drawGameOver();
            }
        }

        // Game loop
        function gameLoop() {
            if (gameRunning) {
                player.update();
                spawnObstacles();
                updateObstacles();
                updateCoins();
                increaseDifficulty();
                updateScore();
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize
        updateScore();
        document.getElementById('gameStatus').textContent = '👆 Click or Press SPACE to start!';
        gameLoop();
    </script>
</body>
</html>
